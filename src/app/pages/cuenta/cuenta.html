<div class="page">
  <div class="content">
    <h1 class="page__title">Mi Cuenta</h1>

    <div class="account-card">
      <div class="profile-header">
        <div class="profile-avatar">{{ initials }}</div>
        <div>
          <div class="profile-name">{{ nombre }} {{ apellido }}</div>
          <div class="profile-meta">{{ correo }} | {{ plan }}</div>
        </div>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Nombre</label>
          <input class="form-input" [(ngModel)]="nombre" name="nombre" />
        </div>
        <div class="form-group">
          <label class="form-label">Apellido</label>
          <input class="form-input" [(ngModel)]="apellido" name="apellido" />
        </div>
        <div class="form-group">
          <label class="form-label">Correo</label>
          <input class="form-input" type="email" [(ngModel)]="correo" name="correo" />
        </div>
        <div class="form-group">
          <label class="form-label">Teléfono</label>
          <input class="form-input" [(ngModel)]="telefono" name="telefono" />
        </div>
        <div class="form-group">
          <label class="form-label">Contraseña</label>
          <input class="form-input" type="password" [(ngModel)]="password" name="password" />
        </div>
        <div class="form-group">
          <label class="form-label">Zona horaria</label>
          <input class="form-input" [(ngModel)]="zonaHoraria" name="zonaHoraria" />
        </div>
      </div>

      <div class="account-actions">
        <button mat-flat-button class="btn-save">GUARDAR CAMBIOS</button>
        <button mat-stroked-button class="btn-logout" (click)="logout()">CERRAR SESIÓN</button>
      </div>
    </div>
  </div>
</div>
