<div class="layout">
  <aside class="sidebar">
    <div class="sidebar__brand">
      <div class="sidebar__avatar">TF</div>
      <span class="sidebar__title">TimeFlow</span>
    </div>

    <nav class="sidebar__nav">
      @for (group of navGroups; track group.group) {
        <div class="sidebar__group">
          <span class="sidebar__group-label">{{ group.group }}</span>
          @for (item of group.items; track item.route) {
            <a
              class="sidebar__item"
              [routerLink]="item.route"
              routerLinkActive="sidebar__item--active"
            >{{ item.label }}</a>
          }
        </div>
      }
    </nav>

    <div class="sidebar__footer">
      <a class="sidebar__logout" routerLink="/login">Cerrar sesión</a>
    </div>
  </aside>

  <main class="content">
    <router-outlet />
  </main>
</div>
